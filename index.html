<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Survival Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: #eee;
    }
    #ui {
      display: flex;
      gap: 32px;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
    }
    #hp-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #hp-bar-bg {
      width: 200px;
      height: 14px;
      background: #333;
      border-radius: 7px;
      overflow: hidden;
    }
    #hp-bar {
      height: 100%;
      width: 100%;
      background: #2ecc71;
      border-radius: 7px;
      transition: width 0.1s, background 0.2s;
    }
    canvas {
      border: 1px solid #333;
      display: block;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      pointer-events: none;
    }
    #overlay h1 { font-size: 36px; }
    #overlay p  { font-size: 16px; color: #aaa; }
    #overlay button {
      pointer-events: all;
      padding: 10px 28px;
      font-size: 16px;
      font-family: monospace;
      background: #2ecc71;
      color: #111;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #overlay button:hover { background: #27ae60; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="ui">
  <div id="hp-bar-wrap">
    <span>HP</span>
    <div id="hp-bar-bg"><div id="hp-bar"></div></div>
    <span id="hp-text">100</span>
  </div>
  <span>Kills: <b id="kill-count">0</b></span>
  <span>Wave: <b id="wave-num">1</b></span>
  <span>Time: <b id="elapsed">0s</b></span>
</div>

<div style="position:relative">
  <canvas id="c" width="800" height="560"></canvas>
  <div id="overlay">
    <h1 id="overlay-title">Survival Shooter</h1>
    <p id="overlay-sub">Survive as long as you can.</p>
    <p style="font-size:13px;color:#777">WASD / Arrow Keys to move &nbsp;·&nbsp; Auto-aim shoots automatically</p>
    <button id="start-btn">Start Game</button>
  </div>
</div>

<script>
// ─── Canvas & ctx ─────────────────────────────────────────────────────────────
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── UI refs ──────────────────────────────────────────────────────────────────
const hpBar      = document.getElementById('hp-bar');
const hpText     = document.getElementById('hp-text');
const killCount  = document.getElementById('kill-count');
const waveNum    = document.getElementById('wave-num');
const elapsed    = document.getElementById('elapsed');
const overlay    = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlaySub   = document.getElementById('overlay-sub');
const startBtn   = document.getElementById('start-btn');

// ─── Game state ───────────────────────────────────────────────────────────────
let state = 'menu'; // menu | running | dead
let player, enemies, bullets, particles;
let kills, startTime, lastEnemy, lastShot, lastWave, wave;
let keys = {};

// ─── Constants ────────────────────────────────────────────────────────────────
const PLAYER_SPEED   = 220;  // px/s
const PLAYER_RADIUS  = 14;
const PLAYER_MAX_HP  = 100;
const ENEMY_SIZE     = 20;   // half-side (square drawn -size to +size)
const ENEMY_BASE_SPD = 90;   // px/s (increases per wave)
const BULLET_SPEED   = 380;  // px/s
const BULLET_RADIUS  = 5;
const SHOOT_INTERVAL = 0.5;  // seconds
const SPAWN_INTERVAL = 2.0;  // seconds (decreases per wave)
const CONTACT_DMG    = 20;
const CONTACT_CD     = 1.0;  // seconds cooldown per enemy after hitting

// ─── Init / Reset ─────────────────────────────────────────────────────────────
function init() {
  player = {
    x: W / 2, y: H / 2,
    r: PLAYER_RADIUS,
    hp: PLAYER_MAX_HP,
    contactTimer: 0,  // global contact cooldown (any enemy)
  };
  enemies   = [];
  bullets   = [];
  particles = [];
  kills     = 0;
  wave      = 1;
  startTime = performance.now();
  lastEnemy = 0;
  lastShot  = 0;
  lastWave  = startTime;
  updateHUD();
}

// ─── Spawning ─────────────────────────────────────────────────────────────────
function spawnEnemy() {
  const edge = Math.random() * 4 | 0;
  let x, y;
  const pad = ENEMY_SIZE + 2;
  if (edge === 0) { x = Math.random() * W; y = -pad; }
  else if (edge === 1) { x = W + pad; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = H + pad; }
  else { x = -pad; y = Math.random() * H; }
  enemies.push({
    x, y,
    size: ENEMY_SIZE,
    speed: ENEMY_BASE_SPD + (wave - 1) * 12,
    hitTimer: 0,   // individual hit-flash timer
  });
}

// ─── Shooting ─────────────────────────────────────────────────────────────────
function fireAtNearest() {
  if (!enemies.length) return;
  let nearest = null, bestDist = Infinity;
  for (const e of enemies) {
    const d = Math.hypot(e.x - player.x, e.y - player.y);
    if (d < bestDist) { bestDist = d; nearest = e; }
  }
  if (!nearest) return;
  const angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
  bullets.push({
    x: player.x, y: player.y,
    vx: Math.cos(angle) * BULLET_SPEED,
    vy: Math.sin(angle) * BULLET_SPEED,
    r: BULLET_RADIUS,
  });
}

// ─── Particles ────────────────────────────────────────────────────────────────
function burst(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = 60 + Math.random() * 100;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      r: 2 + Math.random() * 3,
      life: 0.4 + Math.random() * 0.3,
      maxLife: 0.4 + Math.random() * 0.3,
      color,
    });
  }
}

// ─── Input ────────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (state === 'menu' || state === 'dead') {
    if (e.code === 'Space' || e.code === 'Enter') startGame();
  }
  // Prevent arrow-key page scroll
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Game loop ────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (state === 'running') update(dt, ts);
  draw(ts);
}

function update(dt, ts) {
  const sec = (ts - startTime) / 1000;

  // ── Wave progression ──
  if (ts - lastWave > 20000) { wave++; lastWave = ts; }

  // ── Enemy spawn ──
  const spawnInterval = Math.max(0.6, SPAWN_INTERVAL - (wave - 1) * 0.15);
  if (ts - lastEnemy > spawnInterval * 1000) { spawnEnemy(); lastEnemy = ts; }

  // ── Auto-shoot ──
  if (ts - lastShot > SHOOT_INTERVAL * 1000) { fireAtNearest(); lastShot = ts; }

  // ── Player movement ──
  let dx = 0, dy = 0;
  if (keys['KeyW'] || keys['ArrowUp'])    dy -= 1;
  if (keys['KeyS'] || keys['ArrowDown'])  dy += 1;
  if (keys['KeyA'] || keys['ArrowLeft'])  dx -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  player.x = Math.max(player.r, Math.min(W - player.r, player.x + dx * PLAYER_SPEED * dt));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y + dy * PLAYER_SPEED * dt));
  if (player.contactTimer > 0) player.contactTimer -= dt;

  // ── Bullets ──
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      bullets.splice(i, 1); continue;
    }
    // Bullet-enemy collision
    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (Math.abs(b.x - e.x) < e.size && Math.abs(b.y - e.y) < e.size) {
        burst(e.x, e.y, '#e74c3c', 10);
        enemies.splice(j, 1);
        kills++;
        hit = true;
        break;
      }
    }
    if (hit) { bullets.splice(i, 1); }
  }

  // ── Enemy movement & player contact ──
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const angle = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(angle) * e.speed * dt;
    e.y += Math.sin(angle) * e.speed * dt;
    if (e.hitTimer > 0) e.hitTimer -= dt;

    // Enemy-player contact
    if (
      Math.abs(e.x - player.x) < e.size + player.r - 4 &&
      Math.abs(e.y - player.y) < e.size + player.r - 4
    ) {
      if (player.contactTimer <= 0) {
        player.hp = Math.max(0, player.hp - CONTACT_DMG);
        player.contactTimer = CONTACT_CD;
        burst(player.x, player.y, '#e74c3c', 6);
        enemies.splice(i, 1);
        if (player.hp === 0) { state = 'dead'; showDeadScreen(sec); return; }
        continue;
      }
    }
  }

  // ── Particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.92;
    p.vy *= 0.92;
  }

  updateHUD(sec);
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw(ts) {
  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // Grid (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y <= H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Enemies
  for (const e of enemies) {
    const flash = e.hitTimer > 0;
    ctx.fillStyle = flash ? '#ff8080' : '#e74c3c';
    ctx.shadowColor = '#e74c3c';
    ctx.shadowBlur = 8;
    ctx.fillRect(e.x - e.size, e.y - e.size, e.size * 2, e.size * 2);
    ctx.shadowBlur = 0;
  }

  // Bullets
  ctx.fillStyle = '#f1c40f';
  ctx.shadowColor = '#f1c40f';
  ctx.shadowBlur = 10;
  for (const b of bullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Player
  const playerFlash = player && player.contactTimer > 0;
  ctx.fillStyle = playerFlash ? '#80b3ff' : '#3498db';
  ctx.shadowColor = '#3498db';
  ctx.shadowBlur = 16;
  if (player) {
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
    ctx.fill();
    // Player direction indicator (dot in center)
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(player.x, player.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function updateHUD(sec = 0) {
  const pct = player ? (player.hp / PLAYER_MAX_HP * 100) : 0;
  hpBar.style.width = pct + '%';
  hpBar.style.background = pct > 50 ? '#2ecc71' : pct > 25 ? '#f39c12' : '#e74c3c';
  hpText.textContent = player ? Math.ceil(player.hp) : 0;
  killCount.textContent = kills;
  waveNum.textContent = wave;
  elapsed.textContent = Math.floor(sec) + 's';
}

// ─── State transitions ────────────────────────────────────────────────────────
function startGame() {
  init();
  state = 'running';
  overlay.classList.add('hidden');
}

function showDeadScreen(sec) {
  overlay.classList.remove('hidden');
  overlayTitle.textContent = 'You Died';
  overlaySub.textContent = `Survived ${Math.floor(sec)}s · ${kills} kills · Wave ${wave}`;
  startBtn.textContent = 'Play Again';
}

startBtn.addEventListener('click', startGame);

// ─── Kick off loop ────────────────────────────────────────────────────────────
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
