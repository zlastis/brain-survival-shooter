<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Survival Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: #eee;
    }
    #ui {
      display: flex;
      gap: 32px;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
    }
    #hp-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #hp-bar-bg {
      width: 200px;
      height: 14px;
      background: #333;
      border-radius: 7px;
      overflow: hidden;
    }
    #hp-bar {
      height: 100%;
      width: 100%;
      background: #2ecc71;
      border-radius: 7px;
      transition: width 0.1s, background 0.2s;
    }
    canvas {
      border: 1px solid #333;
      display: block;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      pointer-events: none;
      /* left half of canvas only during prep */
    }
    #overlay h1 { font-size: 36px; }
    #overlay p  { font-size: 16px; color: #aaa; }
    #overlay button {
      pointer-events: all;
      padding: 10px 28px;
      font-size: 16px;
      font-family: monospace;
      background: #2ecc71;
      color: #111;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #overlay button:hover { background: #27ae60; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="ui">
  <div id="hp-bar-wrap">
    <span>HP</span>
    <div id="hp-bar-bg"><div id="hp-bar"></div></div>
    <span id="hp-text">100</span>
  </div>
  <span>Kills: <b id="kill-count">0</b></span>
  <span>Quarter: <b id="quarter-num">1</b></span>
  <span id="timer-wrap">Time: <b id="countdown">60s</b></span>
</div>

<div style="position:relative">
  <canvas id="c" width="800" height="560"></canvas>
  <div id="overlay">
    <h1 id="overlay-title">Survival Shooter</h1>
    <p id="overlay-sub">Survive as long as you can.</p>
    <p style="font-size:13px;color:#777">WASD / Arrow Keys to move &nbsp;·&nbsp; Auto-aim shoots automatically</p>
    <button id="start-btn">Start Game</button>
  </div>
</div>

<script>
// ─── Canvas & ctx ─────────────────────────────────────────────────────────────
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── UI refs ──────────────────────────────────────────────────────────────────
const hpBar        = document.getElementById('hp-bar');
const hpText       = document.getElementById('hp-text');
const killCount    = document.getElementById('kill-count');
const quarterNum   = document.getElementById('quarter-num');
const timerWrap    = document.getElementById('timer-wrap');
const countdown    = document.getElementById('countdown');
const overlay      = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlaySub   = document.getElementById('overlay-sub');
const startBtn     = document.getElementById('start-btn');

// ─── Constants ────────────────────────────────────────────────────────────────
const PLAYER_SPEED      = 220;
const PLAYER_RADIUS     = 14;
const PLAYER_MAX_HP     = 100;
const ENEMY_SIZE        = 20;
const ENEMY_BASE_SPD    = 90;
const BULLET_SPEED      = 380;
const BULLET_RADIUS     = 5;
const SHOOT_INTERVAL    = 0.5;   // seconds
const CONTACT_DMG       = 20;
const CONTACT_CD        = 1.0;

const WALL_X            = 580;   // staging zone divider
const QUARTER_DURATION  = 60;    // seconds per quarter
const SPAWN_RATE_START  = 2.0;   // spawn interval at t=0
const SPAWN_RATE_END    = 0.5;   // spawn interval at t=QUARTER_DURATION
const PREP_SPAWN_INTERVAL = 1.5; // how often enemies trickle into staging during prep

// ─── Game state ───────────────────────────────────────────────────────────────
// states: menu | prep | running | dead
let state = 'menu';
let player, enemies, bullets, particles;
let kills, quarter, quarterTimer, lastEnemy, lastShot;
let keys = {};

// ─── Init / Reset (called once per full game) ─────────────────────────────────
function init() {
  player = {
    x: WALL_X / 2, y: H / 2,
    r: PLAYER_RADIUS,
    hp: PLAYER_MAX_HP,
    contactTimer: 0,
  };
  enemies   = [];
  bullets   = [];
  particles = [];
  kills     = 0;
  quarter   = 1;
  quarterTimer = QUARTER_DURATION;
  lastEnemy = 0;
  lastShot  = 0;
  updateHUD();
}

// ─── Spawn helpers ────────────────────────────────────────────────────────────
function spawnInStaging(released) {
  // Random position in the right staging zone, clear of the wall
  const x = WALL_X + ENEMY_SIZE + 10 + Math.random() * (W - WALL_X - ENEMY_SIZE * 2 - 20);
  const y = ENEMY_SIZE + 10 + Math.random() * (H - ENEMY_SIZE * 2 - 20);
  enemies.push({
    x, y,
    size: ENEMY_SIZE,
    speed: ENEMY_BASE_SPD + (quarter - 1) * 15,
    hitTimer: 0,
    released,
  });
}

// ─── Shooting ─────────────────────────────────────────────────────────────────
function fireAtNearest() {
  // Only target released enemies
  const targets = enemies.filter(e => e.released);
  if (!targets.length) return;
  let nearest = null, bestDist = Infinity;
  for (const e of targets) {
    const d = Math.hypot(e.x - player.x, e.y - player.y);
    if (d < bestDist) { bestDist = d; nearest = e; }
  }
  if (!nearest) return;
  const angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
  bullets.push({
    x: player.x, y: player.y,
    vx: Math.cos(angle) * BULLET_SPEED,
    vy: Math.sin(angle) * BULLET_SPEED,
    r: BULLET_RADIUS,
  });
}

// ─── Particles ────────────────────────────────────────────────────────────────
function burst(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = 60 + Math.random() * 100;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      r: 2 + Math.random() * 3,
      life: 0.4 + Math.random() * 0.3,
      maxLife: 0.4 + Math.random() * 0.3,
      color,
    });
  }
}

// ─── Input ────────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (state === 'menu' || state === 'dead') {
    if (e.code === 'Space' || e.code === 'Enter') startGame();
  }
  if (state === 'prep') {
    if (e.code === 'Space' || e.code === 'Enter') startQuarter();
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Game loop ────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (state === 'prep')    updatePrep(dt, ts);
  if (state === 'running') updateRunning(dt, ts);
  draw();
}

// ─── Prep update (enemies trickle in, don't move) ────────────────────────────
function updatePrep(dt, ts) {
  if (ts - lastEnemy > PREP_SPAWN_INTERVAL * 1000) {
    spawnInStaging(false);
    lastEnemy = ts;
  }
  // Particles still animate
  tickParticles(dt);
  updateHUD();
}

// ─── Running update ───────────────────────────────────────────────────────────
function updateRunning(dt, ts) {
  // ── Quarter countdown ──
  quarterTimer -= dt;
  if (quarterTimer <= 0) {
    endQuarter();
    return;
  }

  // ── Escalating spawn rate ──
  const progress = 1 - (quarterTimer / QUARTER_DURATION); // 0→1 over the quarter
  const spawnInterval = SPAWN_RATE_START + (SPAWN_RATE_END - SPAWN_RATE_START) * progress;
  if (ts - lastEnemy > spawnInterval * 1000) {
    spawnInStaging(true);
    lastEnemy = ts;
  }

  // ── Auto-shoot ──
  if (ts - lastShot > SHOOT_INTERVAL * 1000) { fireAtNearest(); lastShot = ts; }

  // ── Player movement ──
  let dx = 0, dy = 0;
  if (keys['KeyW'] || keys['ArrowUp'])    dy -= 1;
  if (keys['KeyS'] || keys['ArrowDown'])  dy += 1;
  if (keys['KeyA'] || keys['ArrowLeft'])  dx -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  // Player confined to left zone (can't cross wall)
  player.x = Math.max(player.r, Math.min(WALL_X - player.r - 2, player.x + dx * PLAYER_SPEED * dt));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y + dy * PLAYER_SPEED * dt));
  if (player.contactTimer > 0) player.contactTimer -= dt;

  // ── Bullets ──
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      bullets.splice(i, 1); continue;
    }
    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (!e.released) continue;
      if (Math.abs(b.x - e.x) < e.size && Math.abs(b.y - e.y) < e.size) {
        burst(e.x, e.y, '#e74c3c', 10);
        enemies.splice(j, 1);
        kills++;
        hit = true;
        break;
      }
    }
    if (hit) { bullets.splice(i, 1); }
  }

  // ── Enemy movement & player contact ──
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.released) continue;

    const angle = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(angle) * e.speed * dt;
    e.y += Math.sin(angle) * e.speed * dt;
    if (e.hitTimer > 0) e.hitTimer -= dt;

    // Enemy-player contact
    if (
      Math.abs(e.x - player.x) < e.size + player.r - 4 &&
      Math.abs(e.y - player.y) < e.size + player.r - 4
    ) {
      if (player.contactTimer <= 0) {
        player.hp = Math.max(0, player.hp - CONTACT_DMG);
        player.contactTimer = CONTACT_CD;
        burst(player.x, player.y, '#e74c3c', 6);
        enemies.splice(i, 1);
        if (player.hp === 0) { state = 'dead'; showDeadScreen(); return; }
        continue;
      }
    }
  }

  tickParticles(dt);
  updateHUD();
}

function tickParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.92;
    p.vy *= 0.92;
  }
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // Staging zone tint
  ctx.fillStyle = 'rgba(231,76,60,0.06)';
  ctx.fillRect(WALL_X, 0, W - WALL_X, H);

  // Grid (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y <= H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Wall
  ctx.strokeStyle = 'rgba(231,76,60,0.55)';
  ctx.lineWidth = 3;
  ctx.setLineDash([12, 8]);
  ctx.beginPath();
  ctx.moveTo(WALL_X, 0);
  ctx.lineTo(WALL_X, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // Wall label
  ctx.fillStyle = 'rgba(231,76,60,0.4)';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STAGING', WALL_X + (W - WALL_X) / 2, 18);
  ctx.textAlign = 'left';

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Enemies
  for (const e of enemies) {
    ctx.fillStyle = e.released ? '#e74c3c' : '#8b2a2a';
    ctx.shadowColor = e.released ? '#e74c3c' : '#8b2a2a';
    ctx.shadowBlur = e.released ? 8 : 4;
    ctx.fillRect(e.x - e.size, e.y - e.size, e.size * 2, e.size * 2);
    ctx.shadowBlur = 0;
  }

  // Bullets
  ctx.fillStyle = '#f1c40f';
  ctx.shadowColor = '#f1c40f';
  ctx.shadowBlur = 10;
  for (const b of bullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Player
  if (player) {
    const playerFlash = player.contactTimer > 0;
    ctx.fillStyle = playerFlash ? '#80b3ff' : '#3498db';
    ctx.shadowColor = '#3498db';
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(player.x, player.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Countdown bar (running only) — drawn at bottom of canvas
  if (state === 'running') {
    const pct = quarterTimer / QUARTER_DURATION;
    const barW = WALL_X - 20;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(10, H - 8, barW, 5);
    ctx.fillStyle = pct > 0.4 ? '#2ecc71' : pct > 0.2 ? '#f39c12' : '#e74c3c';
    ctx.fillRect(10, H - 8, barW * pct, 5);
  }
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function updateHUD() {
  const pct = player ? (player.hp / PLAYER_MAX_HP * 100) : 0;
  hpBar.style.width = pct + '%';
  hpBar.style.background = pct > 50 ? '#2ecc71' : pct > 25 ? '#f39c12' : '#e74c3c';
  hpText.textContent = player ? Math.ceil(player.hp) : 0;
  killCount.textContent = kills;
  quarterNum.textContent = quarter;

  if (state === 'running') {
    timerWrap.style.display = '';
    countdown.textContent = Math.ceil(quarterTimer) + 's';
  } else {
    timerWrap.style.display = 'none';
  }
}

// ─── State transitions ────────────────────────────────────────────────────────
function startGame() {
  init();
  state = 'prep';
  showPrepScreen();
}

function showPrepScreen() {
  overlay.classList.remove('hidden');
  overlayTitle.textContent = `Quarter ${quarter}`;
  overlaySub.textContent = quarter === 1
    ? 'Enemies are gathering. Get ready.'
    : `Quarter ${quarter - 1} cleared! Prepare for the next wave.`;
  startBtn.textContent = `Start Quarter ${quarter}`;
  startBtn.onclick = startQuarter;
  timerWrap.style.display = 'none';
}

function startQuarter() {
  // Release all staged enemies
  for (const e of enemies) e.released = true;
  quarterTimer = QUARTER_DURATION;
  lastEnemy = performance.now();
  lastShot  = performance.now();
  state = 'running';
  overlay.classList.add('hidden');
}

function endQuarter() {
  // Clear the field
  enemies   = [];
  bullets   = [];
  particles = [];
  quarter++;
  state = 'prep';
  lastEnemy = 0;
  showPrepScreen();
}

function showDeadScreen() {
  overlay.classList.remove('hidden');
  overlayTitle.textContent = 'You Died';
  overlaySub.textContent = `Quarter ${quarter} · ${kills} kills · ${Math.ceil(quarterTimer)}s remaining`;
  startBtn.textContent = 'Play Again';
  startBtn.onclick = startGame;
}

startBtn.addEventListener('click', startGame);
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    if (state === 'prep') startQuarter();
  }
});

// ─── Kick off loop ────────────────────────────────────────────────────────────
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
